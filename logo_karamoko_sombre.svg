<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Gradient vert principal -->
    <linearGradient id="grad_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
    <!-- Gradient or -->
    <linearGradient id="grad_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1"/>
    </linearGradient>
    <!-- Gradient texte principal -->
    <linearGradient id="grad_text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#e2e8f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    <!-- Gradient BHDS -->
    <linearGradient id="grad_bhds" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#CE1126;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow torche -->
    <filter id="glow_torch" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background card -->
    <linearGradient id="bg_card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1420;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#07090f;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background arrondi -->
  <rect width="400" height="160" rx="20" fill="url(#bg_card)"/>
  <!-- Bordure subtile -->
  <rect width="400" height="160" rx="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Accent vert haut gauche -->
  <rect x="0" y="0" width="120" height="3" rx="1.5" fill="url(#grad_bhds)"/>

  <!-- ===== ICÔNE LIVRE OUVERT ===== -->
  <!-- Page gauche -->
  <path d="M 28 108 L 28 48 Q 28 44 32 43 Q 52 38 72 42 Q 78 43 80 48 L 80 108 Q 78 104 72 103 Q 52 99 32 104 Q 28 105 28 108 Z"
        fill="#1e2d3d" stroke="#10b981" stroke-width="1.5"/>
  <!-- Lignes page gauche -->
  <line x1="35" y1="58" x2="73" y2="61" stroke="rgba(16,185,129,0.3)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="35" y1="68" x2="73" y2="70" stroke="rgba(16,185,129,0.25)" stroke-width="1" stroke-linecap="round"/>
  <line x1="35" y1="77" x2="73" y2="79" stroke="rgba(16,185,129,0.2)" stroke-width="1" stroke-linecap="round"/>
  <line x1="35" y1="86" x2="65" y2="87" stroke="rgba(16,185,129,0.18)" stroke-width="1" stroke-linecap="round"/>

  <!-- Page droite -->
  <path d="M 84 108 L 84 48 Q 84 43 88 42 Q 108 38 128 43 Q 132 44 132 48 L 132 108 Q 132 105 128 104 Q 108 99 88 103 Q 84 104 84 108 Z"
        fill="#1e2d3d" stroke="#10b981" stroke-width="1.5"/>
  <!-- Lignes page droite -->
  <line x1="91" y1="61" x2="125" y2="58" stroke="rgba(16,185,129,0.3)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="91" y1="70" x2="125" y2="68" stroke="rgba(16,185,129,0.25)" stroke-width="1" stroke-linecap="round"/>
  <line x1="91" y1="79" x2="125" y2="77" stroke="rgba(16,185,129,0.2)" stroke-width="1" stroke-linecap="round"/>
  <line x1="91" y1="87" x2="115" y2="86" stroke="rgba(16,185,129,0.18)" stroke-width="1" stroke-linecap="round"/>

  <!-- Reliure centrale -->
  <path d="M 80 108 L 80 48 Q 80 40 80 38 Q 80 38 80 38 Q 80 38 80 40 L 84 48 L 84 108 Z"
        fill="#10b981" opacity="0.9"/>

  <!-- ===== TORCHE ===== -->
  <!-- Manche -->
  <rect x="75" y="98" width="10" height="28" rx="3" fill="url(#grad_gold)" filter="url(#glow_torch)"/>
  <!-- Corps torche -->
  <path d="M 70 72 Q 68 82 72 94 Q 74 98 80 99 Q 86 98 88 94 Q 92 82 90 72 Q 85 66 80 65 Q 75 66 70 72 Z"
        fill="#d97706"/>
  <!-- Flamme externe -->
  <path d="M 80 38 Q 68 50 70 64 Q 74 70 80 68 Q 86 70 90 64 Q 92 50 80 38 Z"
        fill="url(#grad_gold)" filter="url(#glow_torch)" opacity="0.95"/>
  <!-- Flamme interne -->
  <path d="M 80 46 Q 74 55 76 63 Q 78 67 80 66 Q 82 67 84 63 Q 86 55 80 46 Z"
        fill="#fef3c7" opacity="0.9"/>
  <!-- Cœur flamme -->
  <ellipse cx="80" cy="60" rx="3" ry="5" fill="white" opacity="0.7"/>

  <!-- ===== DRAPEAU GUINÉEN (mini) ===== -->
  <rect x="110" y="28" width="8" height="18" rx="1" fill="#CE1126"/>
  <rect x="118" y="28" width="8" height="18" rx="0" fill="#FCD116"/>
  <rect x="126" y="28" width="8" height="18" rx="1" fill="#009460"/>
  <!-- Bord drapeau -->
  <rect x="110" y="28" width="24" height="18" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <!-- Mât -->
  <line x1="109" y1="24" x2="109" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ===== TEXTE KARAMOKO ===== -->
  <text x="155" y="82"
        font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="42"
        font-weight="400"
        fill="url(#grad_text)"
        filter="url(#glow)"
        letter-spacing="1">Karamoko</text>

  <!-- ===== TEXTE BHDS ===== -->
  <text x="156" y="110"
        font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="22"
        font-weight="400"
        fill="url(#grad_bhds)"
        letter-spacing="6">BHDS</text>

  <!-- Séparateur ligne décorative -->
  <line x1="155" y1="118" x2="390" y2="118" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="157" y="134"
        font-family="'Nunito', Arial, sans-serif"
        font-size="10.5"
        font-weight="700"
        fill="rgba(240,244,255,0.45)"
        letter-spacing="2.5">LE SAVOIR À PORTÉE DE TOUS</text>
</svg>
