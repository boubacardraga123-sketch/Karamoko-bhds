<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1420"/>
      <stop offset="100%" style="stop-color:#07090f"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="bhds" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#CE1126"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Bordure verte subtile -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#10b981" stroke-width="8" opacity="0.3"/>

  <!-- Bande décorative haut -->
  <rect x="60" y="40" width="392" height="8" rx="4" fill="url(#bhds)" opacity="0.8"/>

  <!-- LIVRE GAUCHE -->
  <path d="M 80 370 L 80 170 Q 80 155 95 150 Q 155 130 210 140 Q 230 145 240 160 L 240 370 Q 225 360 210 358 Q 155 345 95 358 Q 80 362 80 370 Z"
        fill="#1e2d3d" stroke="#10b981" stroke-width="4"/>
  <!-- Lignes page gauche -->
  <line x1="105" y1="200" x2="218" y2="206" stroke="rgba(16,185,129,0.35)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="105" y1="230" x2="218" y2="235" stroke="rgba(16,185,129,0.28)" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="258" x2="218" y2="262" stroke="rgba(16,185,129,0.22)" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="285" x2="200" y2="288" stroke="rgba(16,185,129,0.18)" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="312" x2="180" y2="314" stroke="rgba(16,185,129,0.14)" stroke-width="3" stroke-linecap="round"/>

  <!-- LIVRE DROITE -->
  <path d="M 272 370 L 272 160 Q 272 145 292 140 Q 347 130 407 150 Q 422 155 422 170 L 422 370 Q 422 362 407 358 Q 347 345 292 358 Q 272 362 272 370 Z"
        fill="#1e2d3d" stroke="#10b981" stroke-width="4"/>
  <!-- Lignes page droite -->
  <line x1="294" y1="206" x2="400" y2="200" stroke="rgba(16,185,129,0.35)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="294" y1="235" x2="400" y2="230" stroke="rgba(16,185,129,0.28)" stroke-width="3" stroke-linecap="round"/>
  <line x1="294" y1="262" x2="400" y2="258" stroke="rgba(16,185,129,0.22)" stroke-width="3" stroke-linecap="round"/>
  <line x1="294" y1="288" x2="380" y2="285" stroke="rgba(16,185,129,0.18)" stroke-width="3" stroke-linecap="round"/>
  <line x1="294" y1="314" x2="360" y2="312" stroke="rgba(16,185,129,0.14)" stroke-width="3" stroke-linecap="round"/>

  <!-- RELIURE -->
  <rect x="240" y="155" width="32" height="215" rx="4" fill="url(#green)"/>

  <!-- TORCHE - manche -->
  <rect x="242" y="355" width="28" height="90" rx="8" fill="url(#gold)" filter="url(#glow)"/>

  <!-- TORCHE - corps -->
  <path d="M 220 240 Q 214 272 222 310 Q 230 340 256 345 Q 282 340 290 310 Q 298 272 292 240 Q 278 218 256 214 Q 234 218 220 240 Z"
        fill="#d97706"/>

  <!-- FLAMME externe -->
  <path d="M 256 80 Q 218 118 222 168 Q 230 205 256 200 Q 282 205 290 168 Q 294 118 256 80 Z"
        fill="url(#gold)" filter="url(#glow)" opacity="0.95"/>

  <!-- FLAMME interne -->
  <path d="M 256 110 Q 237 142 241 172 Q 247 196 256 192 Q 265 196 271 172 Q 275 142 256 110 Z"
        fill="#fef3c7" opacity="0.9"/>

  <!-- Cœur flamme -->
  <ellipse cx="256" cy="170" rx="12" ry="20" fill="white" opacity="0.75"/>

  <!-- DRAPEAU GUINÉEN -->
  <rect x="340" y="55" width="30" height="60" rx="3" fill="#CE1126"/>
  <rect x="370" y="55" width="30" height="60" fill="#FCD116"/>
  <rect x="400" y="55" width="30" height="60" rx="3" fill="#009460"/>
  <rect x="340" y="55" width="90" height="60" rx="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Mât -->
  <line x1="338" y1="44" x2="338" y2="130" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>

  <!-- TEXTE BHDS en bas -->
  <text x="256" y="468"
        font-family="'Fredoka One', Arial Rounded MT Bold, Arial, sans-serif"
        font-size="52"
        font-weight="400"
        text-anchor="middle"
        fill="url(#bhds)"
        letter-spacing="12">BHDS</text>
</svg>
