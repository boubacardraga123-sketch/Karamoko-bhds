<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="grad_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="grad_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="grad_text_dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="grad_bhds2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#CE1126"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond transparent -->

  <!-- ===== ICÔNE LIVRE OUVERT ===== -->
  <path d="M 28 108 L 28 48 Q 28 44 32 43 Q 52 38 72 42 Q 78 43 80 48 L 80 108 Q 78 104 72 103 Q 52 99 32 104 Q 28 105 28 108 Z"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.8"/>
  <line x1="35" y1="58" x2="73" y2="61" stroke="rgba(16,185,129,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="35" y1="68" x2="73" y2="70" stroke="rgba(16,185,129,0.4)" stroke-width="1" stroke-linecap="round"/>
  <line x1="35" y1="77" x2="73" y2="79" stroke="rgba(16,185,129,0.35)" stroke-width="1" stroke-linecap="round"/>
  <line x1="35" y1="86" x2="65" y2="87" stroke="rgba(16,185,129,0.3)" stroke-width="1" stroke-linecap="round"/>

  <path d="M 84 108 L 84 48 Q 84 43 88 42 Q 108 38 128 43 Q 132 44 132 48 L 132 108 Q 132 105 128 104 Q 108 99 88 103 Q 84 104 84 108 Z"
        fill="#d1fae5" stroke="#10b981" stroke-width="1.8"/>
  <line x1="91" y1="61" x2="125" y2="58" stroke="rgba(16,185,129,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="91" y1="70" x2="125" y2="68" stroke="rgba(16,185,129,0.4)" stroke-width="1" stroke-linecap="round"/>
  <line x1="91" y1="79" x2="125" y2="77" stroke="rgba(16,185,129,0.35)" stroke-width="1" stroke-linecap="round"/>
  <line x1="91" y1="87" x2="115" y2="86" stroke="rgba(16,185,129,0.3)" stroke-width="1" stroke-linecap="round"/>

  <path d="M 80 108 L 80 48 L 84 48 L 84 108 Z" fill="#10b981"/>

  <!-- Torche -->
  <rect x="75" y="98" width="10" height="28" rx="3" fill="url(#grad_gold)"/>
  <path d="M 70 72 Q 68 82 72 94 Q 74 98 80 99 Q 86 98 88 94 Q 92 82 90 72 Q 85 66 80 65 Q 75 66 70 72 Z" fill="#d97706"/>
  <path d="M 80 38 Q 68 50 70 64 Q 74 70 80 68 Q 86 70 90 64 Q 92 50 80 38 Z" fill="url(#grad_gold)" opacity="0.95"/>
  <path d="M 80 46 Q 74 55 76 63 Q 78 67 80 66 Q 82 67 84 63 Q 86 55 80 46 Z" fill="#fbbf24" opacity="0.9"/>
  <ellipse cx="80" cy="60" rx="3" ry="5" fill="#fef3c7" opacity="0.8"/>

  <!-- Drapeau -->
  <rect x="110" y="28" width="8" height="18" rx="1" fill="#CE1126"/>
  <rect x="118" y="28" width="8" height="18" fill="#FCD116"/>
  <rect x="126" y="28" width="8" height="18" rx="1" fill="#009460"/>
  <rect x="110" y="28" width="24" height="18" rx="1" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
  <line x1="109" y1="24" x2="109" y2="50" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Texte foncé pour fond clair -->
  <text x="155" y="82"
        font-family="'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="42"
